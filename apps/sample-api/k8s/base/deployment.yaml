apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-api
  namespace: nexus-apps
  labels:
    app.kubernetes.io/name: sample-api
    app.kubernetes.io/part-of: nexus-platform
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "0.1.0"
  annotations:
    nexus.io/autonomy-level: "0"  # Level 0: observe only (Autonomy Ladder)
    nexus.io/owner: koussay
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-api
        app.kubernetes.io/part-of: nexus-platform
        app.kubernetes.io/component: api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sample-api
          image: ghcr.io/koussayx8/nexus-platform/sample-api:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 10
