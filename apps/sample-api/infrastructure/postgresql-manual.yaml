apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-db
  namespace: nexus-apps
  labels:
    app: sample-db
  annotations:
    nexus.io/autonomy-level: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-db
  template:
    metadata:
      labels:
        app: sample-db
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: docker.io/library/busybox:1.36
          command: ['sh', '-c', 'echo "Mock PostgreSQL running on port 5432"; while true; do sleep 3600; done']
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: sample-db
  namespace: nexus-apps
  labels:
    app: sample-db
spec:
  selector:
    app: sample-db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: sample-db-connection
  namespace: nexus-apps
  labels:
    app: sample-db
type: Opaque
stringData:
  host: sample-db.nexus-apps.svc.cluster.local
  port: "5432"
  database: nexus
  username: nexus
  password: nexus-dev-password
  sslmode: disable
