apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.component_id }}
  labels:
    app: ${{ values.component_id }}
  annotations:
    nexus.io/autonomy-level: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.component_id }}
  template:
    metadata:
      labels:
        app: ${{ values.component_id }}
    spec:
      containers:
        - name: ${{ values.component_id }}
          image: ghcr.io/nexus-platform-team/${{ values.component_id }}:latest
          ports:
            - containerPort: 8000
