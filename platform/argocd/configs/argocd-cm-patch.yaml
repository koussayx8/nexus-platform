apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # Crossplane requires annotation-based tracking (ADR-006)
  application.resourceTrackingMethod: annotation
  
  # Exclude ProviderConfigUsage from ArgoCD UI (noise reduction)
  resource.exclusions: |
    - apiGroups:
      - "*"
      kinds:
      - ProviderConfigUsage
      clusters:
      - "*"
  
  # Ignore status differences for Crossplane resources to prevent constant OutOfSync
  resource.customizations.ignoreResourceUpdates.crossplane.io_XRD: |
    jsonPointers:
      - /status
  resource.customizations.ignoreResourceUpdates.crossplane.io_Composition: |
    jsonPointers:
      - /status
  resource.customizations.ignoreResourceUpdates.crossplane.io_Claim: |
    jsonPointers:
      - /status
  resource.customizations.ignoreResourceUpdates.pkg.crossplane.io_Provider: |
    jsonPointers:
      - /status
  resource.customizations.ignoreResourceUpdates.pkg.crossplane.io_ProviderRevision: |
    jsonPointers:
      - /status
