apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-infrastructure
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nexus-platform
    app.kubernetes.io/component: infrastructure
  annotations:
    nexus.io/owner: platform-team
    nexus.io/adr: "ADR-006"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: nexus

  source:
    repoURL: https://github.com/koussayx8/nexus-platform.git
    targetRevision: main
    path: platform/crossplane/k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m

  # Ignore status differences for Crossplane resources to prevent constant OutOfSync
  ignoreDifferences:
    - group: "crossplane.io"
      kind: "*"
      jsonPointers:
        - /status
    - group: "pkg.crossplane.io"
      kind: "*"
      jsonPointers:
        - /status
