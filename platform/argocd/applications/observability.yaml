apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nexus-platform
    app.kubernetes.io/component: observability
  annotations:
    nexus.io/owner: platform-team
    nexus.io/adr: "ADR-007"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: nexus

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "86.2.2"
    helm:
      values: |
        namespaceOverride: monitoring
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeProxy:
          enabled: false
        kubeApiServer:
          enabled: false
        coreDns:
          enabled: false
        prometheusOperator:
          podAnnotations:
            nexus.io/autonomy-level: "0"
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 128Mi
              cpu: 100m
        prometheus:
          prometheusSpec:
            retention: 7d
            storageSpec:
              emptyDir: {}
            resources:
              limits:
                memory: 1Gi
                cpu: 500m
              requests:
                memory: 512Mi
                cpu: 250m
            podMetadata:
              annotations:
                nexus.io/autonomy-level: "0"
        alertmanager:
          alertmanagerSpec:
            resources:
              limits:
                memory: 256Mi
                cpu: 100m
              requests:
                memory: 128Mi
                cpu: 50m
            podMetadata:
              annotations:
                nexus.io/autonomy-level: "0"
        grafana:
          podAnnotations:
            nexus.io/autonomy-level: "0"
          adminPassword: admin
          resources:
            limits:
              memory: 512Mi
              cpu: 200m
            requests:
              memory: 256Mi
              cpu: 100m
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              searchNamespace: ALL
        kubeStateMetrics:
          podAnnotations:
            nexus.io/autonomy-level: "0"
          resources:
            limits:
              memory: 128Mi
              cpu: 100m
            requests:
              memory: 64Mi
              cpu: 50m
        prometheus-node-exporter:
          podAnnotations:
            nexus.io/autonomy-level: "0"
          hostRootFsMount:
            enabled: false
          resources:
            limits:
              memory: 128Mi
              cpu: 100m
            requests:
              memory: 64Mi
              cpu: 50m

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m

  ignoreDifferences:
    - group: ""
      kind: Secret
      name: prometheus-operator-admission
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: prometheus-operator-tls
      jsonPointers:
        - /data
