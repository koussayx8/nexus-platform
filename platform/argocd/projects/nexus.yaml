apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: nexus
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nexus-platform
  annotations:
    nexus.io/adr: "ADR-004"
spec:
  description: NEXUS platform applications — scoped to this cluster only

  # Only allow sources from the NEXUS repo
  sourceRepos:
    - https://github.com/koussayx8/nexus-platform.git

  # Only allow deploying to nexus-* namespaces on the local cluster
  # crossplane-system added for Crossplane infrastructure (ADR-006)
  # monitoring added for observability stack (ADR-007)
  destinations:
    - server: https://kubernetes.default.svc
      namespace: nexus-apps
    - server: https://kubernetes.default.svc
      namespace: nexus-apps-prod
    - server: https://kubernetes.default.svc
      namespace: crossplane-system
    - server: https://kubernetes.default.svc
      namespace: monitoring

  # Allowed cluster-scoped resources (Namespace is needed for CreateNamespace)
  # CustomResourceDefinition added for Crossplane XRDs (ADR-006)
  # Prometheus Operator CRDs added for observability stack (ADR-007)
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: monitoring.coreos.com
      kind: Prometheus
    - group: monitoring.coreos.com
      kind: Alertmanager
    - group: monitoring.coreos.com
      kind: PrometheusRule
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    - group: monitoring.coreos.com
      kind: Probe

  # Allowed namespace-scoped resources
  # Crossplane resources added for infrastructure provisioning (ADR-006)
  # Prometheus Operator resources added for observability stack (ADR-007)
  namespaceResourceWhitelist:
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
    - group: networking.k8s.io
      kind: Ingress
    - group: autoscaling
      kind: HorizontalPodAutoscaler
    - group: crossplane.io
      kind: CompositeResourceDefinition
    - group: crossplane.io
      kind: Composition
    - group: crossplane.io
      kind: Provider
    - group: crossplane.io
      kind: ProviderConfig
    - group: crossplane.io
      kind: Claim
    - group: pkg.crossplane.io
      kind: ProviderRevision
    - group: pkg.crossplane.io
      kind: ConfigurationRevision
    - group: monitoring.coreos.com
      kind: ServiceMonitor
    - group: monitoring.coreos.com
      kind: PodMonitor
    - group: monitoring.coreos.com
      kind: PrometheusRule
    - group: monitoring.coreos.com
      kind: Probe
    - group: monitoring.coreos.com
      kind: Prometheus
    - group: monitoring.coreos.com
      kind: Alertmanager

  # Deny orphaned resources (extra safety for GitOps)
  orphanedResources:
    warn: true
