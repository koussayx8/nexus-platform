# DigitalOcean API token for Crossplane provider
# IMPORTANT: This is a TEMPLATE. Do NOT commit the real token.
# Apply the real token manually: kubectl apply -f <secret-with-real-token>
# The real token should be in JSON format: {"token":"dop_v1_..."}
# See ADR-006 for credential strategy (manual Secret, migrate to Vault Week 7-8)

apiVersion: v1
kind: Secret
metadata:
  name: digitalocean-creds
  namespace: crossplane-system
type: Opaque
stringData:
  credentials: '{"token":"REPLACE_WITH_REAL_DO_TOKEN"}'
