apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xpostgresqlinstance-dev
  labels:
    app.kubernetes.io/part-of: nexus-platform
    nexus.io/environment: dev
spec:
  compositeTypeRef:
    apiVersion: platform.nexus.io/v1alpha1
    kind: XPostgreSQLInstance

  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: crossplane-contrib-function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: postgresql-deployment
            base:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: sample-db
                namespace: nexus-apps
                labels:
                  app: sample-db
                annotations:
                  nexus.io/autonomy-level: "0"
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: sample-db
                template:
                  metadata:
                    labels:
                      app: sample-db
                  spec:
                    securityContext:
                      runAsNonRoot: true
                      runAsUser: 999
                      fsGroup: 999
                      seccompProfile:
                        type: RuntimeDefault
                    containers:
                      - name: postgres
                        image: docker.io/library/postgres:16-alpine
                        ports:
                          - containerPort: 5432
                        env:
                          - name: POSTGRES_DB
                            value: nexus
                          - name: POSTGRES_USER
                            value: nexus
                          - name: POSTGRES_PASSWORD
                            value: nexus-dev-password
                        resources:
                          requests:
                            cpu: 100m
                            memory: 256Mi
                          limits:
                            cpu: 500m
                            memory: 512Mi
                        volumeMounts:
                          - name: data
                            mountPath: /var/lib/postgresql/data
                        securityContext:
                          allowPrivilegeEscalation: false
                          capabilities:
                            drop:
                              - ALL
                          runAsNonRoot: true
                          seccompProfile:
                            type: RuntimeDefault
                    volumes:
                      - name: data
                        emptyDir: {}
            readinessChecks:
              - type: MatchString
                fieldPath: status.readyReplicas
                matchString: "1"

          - name: postgresql-service
            base:
              apiVersion: v1
              kind: Service
              metadata:
                name: sample-db
                namespace: nexus-apps
                labels:
                  app: sample-db
              spec:
                selector:
                  app: sample-db
                ports:
                  - port: 5432
                    targetPort: 5432
                type: ClusterIP

  writeConnectionSecretsToNamespace: nexus-apps
